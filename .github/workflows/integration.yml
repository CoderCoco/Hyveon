name: Integration Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Install Playwright system dependencies
        # The Azure apt mirror intermittently stalls mid-download and used to
        # hang until the step timeout, failing the job. Short per-download apt
        # timeouts + retries turn a stalled mirror into a fast failure, and the
        # retry loop re-runs the whole install up to 3 times (the mirror usually
        # recovers within a minute). DPkg::Lock::Timeout lets a retry wait out
        # any lock left by a prior run.
        run: |
          printf '%s\n' \
            'Acquire::Retries "5";' \
            'Acquire::http::Timeout "30";' \
            'Acquire::https::Timeout "30";' \
            'DPkg::Lock::Timeout "120";' \
            | sudo tee /etc/apt/apt.conf.d/99hyveon-ci >/dev/null
          for attempt in 1 2 3; do
            echo "::group::Playwright system deps — attempt ${attempt}"
            if DEBIAN_FRONTEND=noninteractive npx playwright install-deps chromium; then
              echo "::endgroup::"
              echo "Installed Playwright system dependencies on attempt ${attempt}"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::apt install attempt ${attempt} failed; retrying in 20s"
            sleep 20
          done
          echo "::error::Playwright system dependencies failed to install after 3 attempts"
          exit 1
        working-directory: app/packages/web
        timeout-minutes: 12

      - run: npm run app:test:integration

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: integration-playwright-report
          path: app/packages/web/playwright-report/
          retention-days: 30
