name: Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  package:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_glob: 'release/*.AppImage'
            artifact_name: linux-AppImage
          - os: macos-latest
            artifact_glob: 'release/*.dmg'
            artifact_name: mac-dmg
          - os: windows-latest
            artifact_glob: 'release/*.exe'
            artifact_name: win-nsis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Verify terraform.tfstate is present
        # terraform/terraform.tfstate is gitignored. electron-builder silently
        # skips a missing extraResources 'from' path, which would ship an
        # installer that lacks the tfstate the app reads from resourcesPath.
        # Fail fast here so the problem is caught before packaging.
        # To fix: supply the state file via a prior step, e.g.:
        #   run: terraform state pull > terraform/terraform.tfstate
        # with AWS credentials available, or pass TF_STATE_PATH to point at a
        # pre-downloaded file.
        run: |
          if [ ! -f terraform/terraform.tfstate ]; then
            echo "::error file=terraform/terraform.tfstate::terraform/terraform.tfstate is missing. The electron-builder extraResources entry for this file will be silently skipped, producing an installer without Terraform state. Supply the file (e.g. via 'terraform state pull') before running desktop:package."
            exit 1
          fi

      - name: Build lambda bundles
        run: npm run app:build:lambdas

      - name: Package desktop app
        run: npm run desktop:package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
