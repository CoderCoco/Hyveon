name: Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_glob: 'release/*.AppImage'
            artifact_name: linux-AppImage
          - os: macos-latest
            artifact_glob: 'release/*.dmg'
            artifact_name: mac-dmg
          - os: windows-latest
            artifact_glob: 'release/*.exe'
            artifact_name: win-nsis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build lambda bundles
        run: npm run app:build:lambdas

      - name: Package desktop app
        run: npm run desktop:package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
