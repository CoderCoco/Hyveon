name: E2E Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Install Electron binary
        # npm ci caches a corrupt/truncated electron zip in ~/.cache/electron,
        # so install.js gets a "Cache hit" and extracts an incomplete dist
        # (only locales/, no binary, no path.txt). require('electron/index.js')
        # then throws "Electron failed to install correctly", failing the
        # electron-smoke spec. Clear the bad cache and force a fresh,
        # checksum-validated download (a truncated re-download now fails loudly
        # on checksum mismatch instead of silently caching garbage), then assert
        # the binary resolves so any regression fails at this step, not mid-test.
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: ''
          force_no_cache: 'true'
          DEBUG: '@electron/get:*'
        run: |
          set +e
          rm -rf node_modules/electron/dist node_modules/electron/path.txt ~/.cache/electron
          echo "==== network reachability to github releases ===="
          curl -sIL -o /dev/null -w "http_code=%{http_code} size=%{size_download} time=%{time_total}\n" \
            https://github.com/electron/electron/releases/download/v36.9.5/electron-v36.9.5-linux-x64.zip
          echo "==== run install.js ===="
          node node_modules/electron/install.js
          echo "install.js exit=$?"
          echo "==== dist contents ===="
          ls -la node_modules/electron/dist/ 2>/dev/null || echo "no dist"
          echo "==== electron cache contents ===="
          ls -laR ~/.cache/electron/ 2>/dev/null || echo "no cache dir"
          echo "==== path.txt ===="
          cat node_modules/electron/path.txt 2>/dev/null || echo "NO path.txt"
          # set the step exit code from the real assertion (diagnostics above already printed)
          test -f node_modules/electron/path.txt
        timeout-minutes: 8

      # No explicit desktop:build step: @hyveon/web's `test:e2e` script always
      # runs `desktop:build` before Playwright, so out/main/index.js is freshly
      # built (never stale) for the electron-smoke spec's `_electron.launch()`.
      # A separate build step here would just double the build time.

      - name: Install Playwright system dependencies
        # Installs the shared libs needed by both the Chromium project and the
        # Electron runtime; xvfb provides the virtual display Electron requires.
        run: DEBIAN_FRONTEND=noninteractive npx playwright install-deps chromium && sudo apt-get install -y xvfb
        working-directory: app/packages/web
        timeout-minutes: 5

      # The Electron project (electron-smoke.spec.ts) needs a display server on
      # Linux; xvfb-run supplies a headless one. The Chromium project runs in
      # the same invocation against `vite preview`.
      - run: xvfb-run -a npm run app:test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: app/packages/web/playwright-report/
          retention-days: 30
