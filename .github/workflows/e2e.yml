name: E2E Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Install Electron binary
        # The runner's npm ci leaves node_modules/electron without a path.txt
        # (the postinstall binary download is skipped — the runner environment
        # carries ELECTRON_SKIP_BINARY_DOWNLOAD), so the electron-smoke spec's
        # `_electron.launch()` -> require('electron/index.js') throws "Electron
        # failed to install correctly". Force a clean download here with the
        # skip flag explicitly cleared, then assert path.txt exists so any
        # future regression fails loudly at this step rather than mid-test.
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: ''
        run: |
          cat node_modules/electron/path.txt 2>/dev/null \
            && echo " <- path.txt present after npm ci" \
            || echo "no path.txt after npm ci"
          rm -rf node_modules/electron/dist node_modules/electron/path.txt
          node node_modules/electron/install.js
          cat node_modules/electron/path.txt && echo " <- path.txt written"
          node -e "console.log('electron resolves to:', require('electron/index.js'))"
        timeout-minutes: 5

      # No explicit desktop:build step: @hyveon/web's `test:e2e` script always
      # runs `desktop:build` before Playwright, so out/main/index.js is freshly
      # built (never stale) for the electron-smoke spec's `_electron.launch()`.
      # A separate build step here would just double the build time.

      - name: Install Playwright system dependencies
        # Installs the shared libs needed by both the Chromium project and the
        # Electron runtime; xvfb provides the virtual display Electron requires.
        run: DEBIAN_FRONTEND=noninteractive npx playwright install-deps chromium && sudo apt-get install -y xvfb
        working-directory: app/packages/web
        timeout-minutes: 5

      # The Electron project (electron-smoke.spec.ts) needs a display server on
      # Linux; xvfb-run supplies a headless one. The Chromium project runs in
      # the same invocation against `vite preview`.
      - run: xvfb-run -a npm run app:test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: app/packages/web/playwright-report/
          retention-days: 30
